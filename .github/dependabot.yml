version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/src/web"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"

  - package-ecosystem: docker
    directory: "/src/api"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"

  - package-ecosystem: docker
    directory: "/src/web"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
