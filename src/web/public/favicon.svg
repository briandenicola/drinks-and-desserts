<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#20306a"/>
      <stop offset="55%" stop-color="#10193e"/>
      <stop offset="100%" stop-color="#040818"/>
    </radialGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbe7a8"/>
      <stop offset="38%" stop-color="#dcb358"/>
      <stop offset="62%" stop-color="#b48a30"/>
      <stop offset="100%" stop-color="#7a5a18"/>
    </linearGradient>

    <linearGradient id="whiskey" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1b566"/>
      <stop offset="40%" stop-color="#c47a1c"/>
      <stop offset="100%" stop-color="#6f3a0e"/>
    </linearGradient>

    <linearGradient id="glassShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="22%" stop-color="rgba(255,255,255,0.03)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0.0)"/>
      <stop offset="82%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.13)"/>
    </linearGradient>

    <linearGradient id="cakeBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a3320"/>
      <stop offset="100%" stop-color="#291509"/>
    </linearGradient>
    <linearGradient id="cakeTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3c1d10"/>
      <stop offset="100%" stop-color="#1c0a04"/>
    </linearGradient>
    <linearGradient id="cream" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7e7b8"/>
      <stop offset="100%" stop-color="#cdaa6e"/>
    </linearGradient>
    <linearGradient id="cherry" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4283a"/>
      <stop offset="100%" stop-color="#79101d"/>
    </linearGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- sparkle dots -->
  <g fill="#d4af37">
    <circle cx="170" cy="200" r="1.6" opacity="0.55"/>
    <circle cx="850" cy="170" r="2" opacity="0.5"/>
    <circle cx="100" cy="380" r="1" opacity="0.4"/>
    <circle cx="920" cy="320" r="1.5" opacity="0.5"/>
    <circle cx="290" cy="110" r="1.2" opacity="0.45"/>
    <circle cx="720" cy="80" r="1" opacity="0.5"/>
    <circle cx="940" cy="500" r="1.3" opacity="0.4"/>
    <circle cx="80" cy="540" r="1" opacity="0.4"/>
    <circle cx="500" cy="92" r="1.1" opacity="0.5"/>
    <circle cx="380" cy="220" r="0.8" opacity="0.35"/>
    <circle cx="640" cy="200" r="0.9" opacity="0.4"/>
  </g>

  <!-- inset double border -->
  <rect x="64" y="64" width="896" height="896" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.6"/>
  <rect x="78" y="78" width="868" height="868" fill="none" stroke="#c89a3a" stroke-width="0.8" opacity="0.45"/>

  <!-- corner diamonds -->
