    <circle cx="665" cy="365" r="17" fill="url(#cherry)"/>
    <ellipse cx="660" cy="358" rx="6.5" ry="4" fill="#f06070" opacity="0.7"/>
    <ellipse cx="660" cy="357" rx="3" ry="2" fill="#ffb0bc" opacity="0.7"/>
    <path d="M 665 348 Q 673 339 684 336"
          stroke="#3a5020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 680 335 Q 690 332 692 340 Q 685 342 680 335 Z" fill="#4a6028"/>

    <path d="M 555 380 L 775 380 L 750 604 L 580 604 Z"
          fill="none" stroke="url(#gold)" stroke-width="3" stroke-linejoin="round"/>

    <ellipse cx="665" cy="604" rx="118" ry="7" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.85"/>
  </g>

  <!-- ===== DIVIDER (visible solid lines + diamond) ===== -->
  <g opacity="0.85">
    <line x1="210" y1="690" x2="478" y2="690" stroke="#c89a3a" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="546" y1="690" x2="814" y2="690" stroke="#c89a3a" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 512 676 L 526 690 L 512 704 L 498 690 Z" fill="url(#gold)"/>
    <path d="M 512 684 L 519 690 L 512 696 L 505 690 Z" fill="#10193e"/>
    <!-- small accents flanking diamond -->
    <circle cx="488" cy="690" r="2" fill="#c89a3a"/>
    <circle cx="536" cy="690" r="2" fill="#c89a3a"/>
  </g>

