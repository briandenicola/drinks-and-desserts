    <path d="M 422 295 Q 426 440 418 595"
          stroke="rgba(255,255,255,0.16)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <path d="M 240 282 L 440 282 L 432 600 Q 432 604 428 604 L 252 604 Q 248 604 248 600 Z"
          fill="none" stroke="url(#gold)" stroke-width="3" stroke-linejoin="round"/>

    <ellipse cx="340" cy="282" rx="100" ry="12" fill="#10193e"/>
    <ellipse cx="340" cy="282" rx="100" ry="12" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <ellipse cx="340" cy="280" rx="86" ry="5" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>

    <line x1="260" y1="592" x2="420" y2="592" stroke="rgba(0,0,0,0.4)" stroke-width="2"/>
  </g>

  <!-- ===== CAKE SLICE ===== -->
  <g>
    <ellipse cx="665" cy="616" rx="118" ry="6" fill="#000" opacity="0.45"/>

    <path d="M 555 380 L 775 380 L 750 604 L 580 604 Z" fill="url(#cakeBody)"/>

