    <line x1="567" y1="548" x2="763" y2="548" stroke="#2a1408" stroke-width="0.7" opacity="0.45"/>
    <line x1="569" y1="564" x2="761" y2="564" stroke="#2a1408" stroke-width="0.7" opacity="0.45"/>

    <path d="M 555 380 L 775 380 L 775 418
