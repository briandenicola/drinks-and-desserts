    <path d="M 64 132 L 73 123 L 82 132 L 73 141 Z"/>
    <path d="M 942 132 L 951 123 L 960 132 L 951 141 Z"/>
    <path d="M 64 892 L 73 883 L 82 892 L 73 901 Z"/>
